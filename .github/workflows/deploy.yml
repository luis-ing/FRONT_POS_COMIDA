name: Deploy Front POS Comida

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy .env from server
        run: cp /docker/apps/front-pos-comida/.env .env

      - name: Copy docker-compose.yml
        run: cp /docker/apps/front-pos-comida/docker-compose.yml docker-compose.yml

      - name: Build and deploy
        run: |
            docker compose down || true
            docker compose up -d --build