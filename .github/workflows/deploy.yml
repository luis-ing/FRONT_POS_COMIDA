name: Deploy Front POS Comida

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          cd /docker/apps/front-pos-comida
          git pull origin main
          docker compose down
          docker compose up -d --build